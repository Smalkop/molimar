name = "molipar"
main = "src/index.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "molipar"
database_id = "193436ea-ed62-4c45-a465-6e73fa3a46cf"

# R2 Bucket
[[r2_buckets]]
binding = "R2"
bucket_name = "productos-clientes"

# Environment variables
# JWT_SECRET se carga como Wrangler secret (no commiteado):
#   npx wrangler secret put JWT_SECRET
[vars]
SITE_NAME = "Molipar S.A."
SITE_URL = "https://molipar.com"
ADMIN_EMAIL = "admin@molipar.com"
COOKIE_SECURE = "true"
